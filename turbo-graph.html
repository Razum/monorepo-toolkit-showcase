const s = "\ndigraph {\n\tcompound = \"true\"\n\tnewrank = \"true\"\n\tsubgraph \"root\" {\n\t\t\"[root] @repo/configs#build\" -\u003E \"[root] ___ROOT___\"\n\t\t\"[root] @repo/toolkit#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] @repo/types#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] @repo/ui#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] @repo/ui#build\" -\u003E \"[root] @repo/types#build\"\n\t\t\"[root] api#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] api#build\" -\u003E \"[root] @repo/toolkit#build\"\n\t\t\"[root] api#build\" -\u003E \"[root] @repo/types#build\"\n\t\t\"[root] spa#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] spa#build\" -\u003E \"[root] @repo/toolkit#build\"\n\t\t\"[root] spa#build\" -\u003E \"[root] @repo/types#build\"\n\t\t\"[root] spa#build\" -\u003E \"[root] @repo/ui#build\"\n\t\t\"[root] ssr#build\" -\u003E \"[root] @repo/configs#build\"\n\t\t\"[root] ssr#build\" -\u003E \"[root] @repo/toolkit#build\"\n\t\t\"[root] ssr#build\" -\u003E \"[root] @repo/types#build\"\n\t\t\"[root] ssr#build\" -\u003E \"[root] @repo/ui#build\"\n\t}\n}\n\n".replace(/\_\_\_ROOT\_\_\_/g, "Root").replace(/\[root\]/g, "");new Viz().renderSVGElement(s).then(el => document.body.appendChild(el)).catch(e => console.error(e));
  </script>
